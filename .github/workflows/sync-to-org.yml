name: Sync to Org

on:
  push:
    branches:
      - main

jobs:
  sync:
    if: github.repository == 'kyudong-rafa-kim/NAVER-Search-AD-Guide_API'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check token
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ERROR: ORG_SYNC_TOKEN is empty or not set"
            exit 1
          else
            echo "Token length: ${#TOKEN} (OK)"
          fi
        env:
          TOKEN: ${{ secrets.ORG_SYNC_TOKEN }}

      - name: Push to org repo
        env:
          TOKEN: ${{ secrets.ORG_SYNC_TOKEN }}
        run: |
          git remote add org https://x-access-token:${TOKEN}@github.com/NAVER-ADCounsulting/api-manual-sample.git
          git push org main --force
